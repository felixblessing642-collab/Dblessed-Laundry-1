// UI Components
const Badge = ({color,children})=>(
  <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:color+"22",color,border:`1px solid ${color}44`}}>{children}</span>
);

const Card = ({children,style={}})=>(
  <div className="fade-in" style={{background:"rgba(255,255,255,0.97)",borderRadius:16,padding:"18px 20px",boxShadow:"0 2px 16px rgba(10,22,40,0.08)",border:"1px solid rgba(226,232,240,0.8)",...style}}>{children}</div>
);

const Btn = ({children,onClick,color,outline,size="md",style={},disabled})=>(
  <button onClick={onClick} disabled={disabled} style={{padding:size==="sm"?"5px 13px":size==="lg"?"13px 28px":"8px 18px",borderRadius:9,border:outline?`2px solid ${color||C.blue}`:"none",background:outline?"transparent":(color||C.blue),color:outline?(color||C.blue):"#fff",fontWeight:700,fontSize:size==="sm"?12:14,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.2s",...style}}>{children}</button>
);

const Stat = ({label,value,icon,color,trend})=>(
  <Card style={{flex:1,minWidth:140}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontSize:11,color:C.g400,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{label}</div>
        <div style={{fontSize:24,fontWeight:900,color:C.navy,marginTop:3,lineHeight:1.1}}>{value}</div>
        {trend&&<div style={{fontSize:11,color:trend>0?C.ok:C.err,marginTop:3}}>{trend>0?"↑":"↓"} {Math.abs(trend)}% this month</div>}
      </div>
      <div style={{width:40,height:40,borderRadius:11,background:(color||C.blue)+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{icon}</div>
    </div>
  </Card>
);

const Progress = ({value,max,color})=>(
  <div style={{background:C.g200,borderRadius:99,height:6,overflow:"hidden"}}>
    <div style={{width:`${Math.min(100,(value/max)*100)}%`,height:"100%",background:color||C.blue,borderRadius:99}}/>
  </div>
);

const StatusBadge = ({status})=>{
  const s=STATUSES.find(x=>x.key===status);
  return s?<Badge color={s.color}>{s.icon} {s.label}</Badge>:null;
};

const SH = ({title,subtitle,action})=>(

    <div>

// POS
const POS = ()=>{
  const [cart,setCart]=React.useState([]);
  const [pay,setPay]=React.useState("cash");
  const [done,setDone]=React.useState(false);
  const add=s=>setCart(p=>{const e=p.find(i=>i.id===s.id);return e?p.map(i=>i.id===s.id?{...i,qty:i.qty+1}:i):[...p,{...s,qty:1}];});
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const tax=Math.round(total*.075);
  if(done) return(
    <Card style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:50,marginBottom:16}}>✅</div>
      <div style={{fontSize:20,fontWeight:900,color:C.ok,marginBottom:8}}>Payment Successful!</div>

      <div style={{fontWeight:900,color:C.gold,fontSize:22,marginBottom:20}}>{fc(total+tax)} via {pay.toUpperCase()}</div>
      <Btn color={C.blue} onClick={()=>{setCart([]);setDone(false);}}>New Transaction</Btn>
    </Card>
  );
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:16}}>
      <Card>
        <SH title="Services Menu"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {SERVICES.map(s=>(
            <button key={s.id} onClick={()=>add(s)}
              style={{padding:14,borderRadius:12,border:`2px solid ${C.g200}`,background:C.white,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{fontSize:26,marginBottom:6}}>{s.icon}</div>
              <div style={{fontWeight:700,fontSize:12,color:C.navy}}>{s.name}</div>
              <div style={{fontSize:10,color:C.g400,marginBottom:4}}>{s.unit}</div>
              <div style={{fontWeight:800,color:C.gold,fontSize:13}}>{fc(s.price)}</div>
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <SH title="🛒 Cart"/>
        {cart.length===0?(
          <div style={{textAlign:"center",padding:"28px 0",color:C.g400}}>
            <div style={{fontSize:32,marginBottom:8}}>🛒</div>
            <div style={{fontSize:13}}>Add services from menu</div>
          </div>
        ):(
          <>
            {cart.map(i=>(
              <div key={i.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:`1px solid ${C.g100}`}}>
                <span style={{fontSize:18}}>{i.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:12}}>{i.name}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>i.qty>1?setCart(p=>p.map(x=>x.id===i.id?{...x,qty:x.qty-1}:x)):setCart(p=>p.filter(x=>x.id!==i.id))}
                    style={{width:22,height:22,borderRadius:5,border:`1px solid ${C.g200}`,background:"transparent",cursor:"pointer"}}>-</button>
                  <span style={{fontWeight:700,fontSize:12,minWidth:14,textAlign:"center"}}>{i.qty}</span>
                  <button onClick={()=>add(i)} style={{width:22,height:22,borderRadius:5,border:`1px solid ${C.blue}`,background:C.blue,color:"#fff",cursor:"pointer"}}>+</button>
                </div>
                <span style={{fontWeight:800,color:C.gold,fontSize:12}}>{fc(i.price*i.qty)}</span>
              </div>
            ))}
            <div style={{background:C.g50,borderRadius:10,padding:12,margin:"14px 0"}}>
              {[["Subtotal",fc(total)],["VAT 7.5%",fc(tax)],["Total",fc(total+tax)]].map(([k,v],i)=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:i<2?5:0,fontWeight:i===2?800:600,fontSize:i===2?15:12,color:i===2?C.gold:C.g600,paddingTop:i===2?8:0,borderTop:i===2?`2px solid ${C.g200}`:"none",marginTop:i===2?8:0}}>
                  <span>{k}</span><span>{v}</span>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
              {["cash","transfer","card","mobile"].map(m=>(
                <button key={m} onClick={()=>setPay(m)}
                  style={{padding:"8px",borderRadius:8,border:`2px solid ${pay===m?C.gold:C.g200}`,background:pay===m?C.gold+"15":"transparent",fontWeight:700,fontSize:12,color:pay===m?C.gold:C.g600,cursor:"pointer",textTransform:"capitalize"}}>

              ))}
            </div>
            <Btn color={C.gold} onClick={()=>setDone(true)} style={{width:"100%"}} size="lg">💳 Checkout {fc(total+tax)}</Btn>
          </>
        )}
      </Card>
    </div>
  );
};

      case "services": return <Services/>;
      case "riders": return <Riders/>;

      case "reports": return <Reports/>;

    switch(active){
      case "home": return <CustHome setActive={setActive}/>;
      case "place_order": return <PlaceOrder/>;
      case "my_orders": return <div><Card><SH title="My Orders"/>{ORDERS.map(o=><div key={o.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.g100}`}}><div><div style={{fontWeight:700,fontSize:12}}>{o.id}</div><div style={{fontSize:10,color:C.g400}}>{o.services.join(", ")}</div></div><div style={{textAlign:"right"}}><StatusBadge status={o.status}/><div style={{fontSize:11,fontWeight:700,color:C.gold,marginTop:2}}>{fc(o.amount)}</div></div></div>)}</Card></div>;
      case "track": return <TrackOrder/>;
      case "pricing": return <div><Card><SH title="Pricing"/><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>{SERVICES.map(s=><div key={s.id} style={{background:C.g50,borderRadius:12,padding:14,textAlign:"center"}}><div style={{fontSize:28,marginBottom:6}}>{s.icon}</div><div style={{fontWeight:700,color:C.navy,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:C.g400,marginBottom:6}}>{s.unit}</div><div style={{fontWeight:900,color:C.gold,fontSize:16}}>{fc(s.price)}</div></div>)}</div></Card></div>;
      case "myplan": return <MyPlan/>;
      case "loyalty": return <Loyalty/>;
      case "referral": return <Referral/>;
      default: return <CustHome setActive={setActive}/>;
    }
  }
  if(role==="rider") return <RiderHome/>;
  if(role==="operations") return <OpsHome/>;
  return <AdminDash/>;
};

// MAIN APP
const App = ()=>{
  const [role,setRole]=React.useState("admin");
  const [active,setActive]=React.useState("dashboard");
  const [collapsed,setCollapsed]=React.useState(false);

  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.g50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      <Sidebar role={role} setRole={r=>{setRole(r);setActive(r==="admin"?"dashboard":r==="customer"?"home":r==="rider"?"rider_home":"ops_home");}}
        active={active} setActive={setActive} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <Topbar role={role} section={SECTION_TITLES[active]||"Dashboard"}/>
        <main style={{flex:1,overflowY:"auto",padding:"20px"}}>
          <div style={{maxWidth:1100,margin:"0 auto"}}>
            {renderSection(role,active,setActive)}
          </div>
        </main>
        <div style={{background:C.white,borderTop:`1px solid ${C.g100}`,padding:"8px 20px",display:"flex",justifyContent:"space-between",fontSize:10,color:C.g400}}>
          <span>© 2024 DBlessed Laundry and Services Ltd</span>
          <span style={{color:C.ok}}>● All systems operational</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
